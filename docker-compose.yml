services:
  firefox-rdp:
    image: ghcr.io/wzcl1/firefox-rdp:latest
    build: .
    ports:
      # Only listen on localhost — remove 127.0.0.1 to expose on all interfaces
      - "127.0.0.1:4000:3389"
    environment:
      RDP_USER: browser
      RDP_PASSWORD: change-me
      FIREFOX_START_URL: https://www.mozilla.org/
    shm_size: "2gb"
    mem_limit: "4gb"
    restart: unless-stopped
