services:
  firefox-rdp:
    build: .
    ports:
      # Only listen on localhost — remove 127.0.0.1 to expose on all interfaces
      - "127.0.0.1:4000:3389"
    environment:
      RDP_USER: browser
      RDP_PASSWORD: change-me
      FIREFOX_START_URL: https://www.mozilla.org/
    shm_size: "2gb"
    mem_limit: "4gb"
    restart: unless-stopped
    # Security: drop all Linux capabilities and only restore what xrdp requires.
    # xrdp-sesman needs sys_admin for virtual display management and
    # dac_override to read files as the RDP_USER. net_bind_service is
    # required for port 3389 binding.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SYS_ADMIN
      - DAC_OVERRIDE
    # Read-only root filesystem to limit write access. xrdp writes only
    # to /tmp, /var, /run, and /home/RDP_USER — provided via tmpfs mounts.
    read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /var:size=128m,mode=1777
      - /run:size=64m,mode=0755
      - /home/browser/.mozilla:size=64m,mode=0700
      - /home/browser/.config:size=64m,mode=0700
      - /home/browser/.cache:size=128m,mode=0700
