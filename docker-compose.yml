services:
  firefox-rdp:
    build: .
    ports:
      - "4000:3389"
    environment:
      RDP_USER: browser
      RDP_PASSWORD: change-me
      FIREFOX_START_URL: https://www.mozilla.org/
    shm_size: "2gb"
    mem_limit: "4gb"
    restart: unless-stopped
    # Security: drop all Linux capabilities and only restore what xrdp requires.
    # setuid is needed for session helper privilege transitions,
    # dac_read_search for reading user files, and net_bind_service for
    # port 3389 binding.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - DAC_READ_SEARCH
    # xrdp writes to /etc (shadow via sed), /tmp, /var, /run (tmpfs) and
    # /home/RDP_USER (named volume).
    read_only: false
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /var:size=128m,mode=0755
      - /run:size=64m,mode=0755
    volumes:
      - firefox-profile:/home/${RDP_USER:-browser}

volumes:
  firefox-profile:
